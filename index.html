<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KellynePDF - Professional PDF Solution</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Global & Professional UI Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 85px;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            height: 55px;
            width: auto;
            margin-right: 12px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 900;
            color: #e5322d;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #444;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-menu li a:hover {
            color: #e5322d;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .signup-btn {
            background-color: #e5322d;
            color: #fff;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 800;
        }

        /* Hero Section */
        .hero {
            max-width: 1100px;
            margin: 60px auto;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .tool-status-title {
            color: #e5322d;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 28px;
            margin-bottom: 30px;
            display: block;
            min-height: 35px;
            transition: opacity 0.3s ease;
        }

        /* Animated Floating Gradient Box */
        .upload-container {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 380px;
            margin: 0 auto;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed rgba(0,0,0,0.1);
            background: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        .floating-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            z-index: 1;
            background: linear-gradient(45deg, #ffcccb, #ffdef2, #d0e1ff, #e6e6fa, #ffcccb);
            background-size: 300% 300%;
            animation: moveGradient 12s ease infinite;
            opacity: 0.4;
            filter: blur(40px);
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .upload-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .upload-btn {
            background: #e5322d;
            color: white;
            padding: 22px 65px;
            border-radius: 15px;
            font-size: 26px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(229, 50, 45, 0.3);
            display: inline-block;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .upload-btn:hover {
            background: #c42a25;
            transform: translateY(-3px);
        }

        .drag-drop-text {
            font-size: 20px;
            color: #444;
            font-weight: 700;
        }

        .upload-container.drag-over {
            border-color: #e5322d;
            background: rgba(229, 50, 45, 0.08);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo-container">
                <img src="logo.png" alt="KellynePDF" class="logo-img">
                <div class="logo-text">KELLYNE<span>PDF</span></div>
            </a>
            
            <nav>
                <ul class="nav-menu">
                    <li><a href="javascript:void(0)" onclick="updateTool('Merge PDF')">Merge PDF</a></li>
                    <li><a href="javascript:void(0)" onclick="updateTool('Split PDF')">Split PDF</a></li>
                    <li><a href="javascript:void(0)" onclick="updateTool('Compress PDF')">Compress PDF</a></li>
                    <li><a href="javascript:void(0)" onclick="updateTool('Convert PDF')">Convert PDF</a></li>
                    <li><a href="javascript:void(0)" onclick="updateTool('eSign PDF')">eSign</a></li>
                    <li><a href="javascript:void(0)" onclick="updateTool('All PDF Tools')">All PDF Tools</a></li>
                </ul>
            </nav>
        </div>

        <div class="nav-right">
            <a href="#login" class="login-link">Login</a>
            <a href="#signup" class="signup-btn">Sign up</a>
        </div>
    </header>

    <main class="hero">
        <h1>KellynePDF - All-In-One Solution</h1>
        <p id="tool-display-name" class="tool-status-title">SELECT PDF FILES</p>
        
        <div class="upload-container" id="drop-zone">
            <div class="floating-bg"></div>
            <div class="upload-content">
                <label for="file-input" class="upload-btn">Select PDF files</label>
                <input type="file" id="file-input" hidden multiple accept=".pdf">
                <div class="drag-drop-text">or drop PDF files here</div>
            </div>
        </div>
    </main>

    <script>
        function updateTool(name) {
            const toolTitle = document.getElementById('tool-display-name');
            toolTitle.style.opacity = '0';
            setTimeout(() => {
                toolTitle.innerText = name;
                toolTitle.style.opacity = '1';
            }, 200);
        }

        const dropZone = document.getElementById('drop-zone');
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            console.log("Files dropped:", files);
        });
    </script>

    <script src="js/auth/google-oauth.js"></script>
    <script src="js/utils/graphics-helper.js"></script>
    
    <script src="js/allpdftools/organize/merge-pdf.js"></script>
    <script src="js/allpdftools/organize/split-pdf.js"></script>
    <script src="js/allpdftools/organize/extract-pages.js"></script>
    <script src="js/allpdftools/organize/remove-pages.js"></script>
    <script src="js/allpdftools/organize/rename-pdf.js"></script>
    <script src="js/allpdftools/organize/scan-to-pdf.js"></script>
    
    <script src="js/allpdftools/optimize/compress-pdf.js"></script>
    <script src="js/allpdftools/optimize/ocr-pdf.js"></script>
    <script src="js/allpdftools/optimize/repair-pdf.js"></script>
    
    <script src="js/allpdftools/edit/edit-pdf.js"></script>
    <script src="js/allpdftools/edit/crop-pdf.js"></script>
    <script src="js/allpdftools/edit/page-numbers.js"></script>
    <script src="js/allpdftools/edit/rotate-pdf.js"></script>
    <script src="js/allpdftools/edit/watermark.js"></script>
    
    <script src="js/allpdftools/security/protect-pdf.js"></script>
    <script src="js/allpdftools/security/unlock-pdf.js"></script>
    <script src="js/allpdftools/security/compare-pdf.js"></script>
    <script src="js/allpdftools/security/redact-pdf.js"></script>
    
    <script src="js/converters/from-pdf/pdf-to-word.js"></script>
    <script src="js/converters/from-pdf/pdf-to-excel.js"></script>
    <script src="js/converters/from-pdf/pdf-to-jpg.js"></script>
    <script src="js/converters/from-pdf/pdf-to-ppt.js"></script>
    <script src="js/converters/from-pdf/pdf-to-html.js"></script>
    <script src="js/converters/from-pdf/pdf-to-pdfa.js"></script>
    
    <script src="js/converters/to-pdf/word-to-pdf.js"></script>
    <script src="js/converters/to-pdf/jpg-to-pdf.js"></script>
    <script src="js/converters/to-pdf/excel-to-pdf.js"></script>
    <script src="js/converters/to-pdf/ppt-to-pdf.js"></script>
    <script src="js/converters/to-pdf/html-to-pdf.js"></script>
    <script src="js/converters/to-pdf/text-to-pdf.js"></script>
    
    <script src="js/esign/aadhar-sign.js"></script>
    <script src="js/esign/digital-sign.js"></script>
    <script src="js/esign/global-sign.js"></script>

</body>
</html>
