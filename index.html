<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELLYNE PDF - Pro Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <style>
        .bg-red-primary { background-color: #E53E3E; }
        .text-red-primary { color: #E53E3E; }
        .mega-menu { display: none; position: absolute; left: 0; width: 100%; background: white; z-index: 1000; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border-top: 2px solid #E53E3E; padding: 30px 0; border-radius: 0 0 20px 20px; }
        .group:hover .mega-menu { display: block; }
        .menu-column h4 { font-size: 10px; font-weight: 900; color: #a0aec0; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid #edf2f7; padding-bottom: 5px; }
        .menu-link { display: block; padding: 4px 0; font-size: 13px; color: #4a5568; font-weight: 500; transition: 0.2s; cursor: pointer; }
        .menu-link:hover { color: #E53E3E; transform: translateX(5px); }
        #tool-box { transition: all 0.3s ease; border: 4px dashed transparent; }
        #tool-box.drag-over { border-color: #E53E3E; background-color: #fff5f5; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="fixed w-full bg-white z-50 border-b shadow-sm h-16 flex items-center px-6">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-6 h-16">
                <div onclick="location.reload()" class="text-2xl font-black text-gray-900 cursor-pointer">
                    <span class="text-red-primary">❤</span> KELLYNE PDF
                </div>
                <div class="hidden lg:flex items-center space-x-5 h-full font-bold text-[10px] uppercase">
                    <button onclick="triggerTool('Merge')" class="hover:text-red-primary">Merge</button>
                    <button onclick="triggerTool('Split')" class="hover:text-red-primary">Split</button>
                    <div class="group h-full flex items-center">
                        <button class="hover:text-red-primary">ALL PDF TOOLS ▼</button>
                        <div class="mega-menu left-0 top-16">
                            <div class="max-w-7xl mx-auto grid grid-cols-6 gap-4 px-6 text-left">
                                <div class="menu-column">
                                    <h4>Organize</h4>
                                    <span onclick="triggerTool('Merge')" class="menu-link">Merge PDF</span>
                                    <span onclick="triggerTool('Split')" class="menu-link">Split PDF</span>
                                    <span onclick="triggerTool('Remove_Pages')" class="menu-link">Remove pages</span>
                                    <span onclick="triggerTool('Organize')" class="menu-link">Organize PDF</span>
                                </div>
                                <div class="menu-column">
                                    <h4>Edit</h4>
                                    <span onclick="triggerTool('Edit')" class="menu-link">Edit PDF</span>
                                    <span onclick="triggerTool('Rotate')" class="menu-link">Rotate PDF</span>
                                    <span onclick="triggerTool('Watermark')" class="menu-link">Watermark</span>
                                    <span onclick="triggerTool('Page_Numbers')" class="menu-link">Page Numbers</span>
                                </div>
                                <div class="menu-column">
                                    <h4>Convert To</h4>
                                    <span onclick="triggerTool('JPG_to_PDF')" class="menu-link">JPG to PDF</span>
                                    <span onclick="triggerTool('HTML_to_PDF')" class="menu-link">HTML to PDF</span>
                                </div>
                                <div class="menu-column">
                                    <h4>Security</h4>
                                    <span onclick="triggerTool('Unlock')" class="menu-link">Unlock PDF</span>
                                    <span onclick="triggerTool('Protect')" class="menu-link">Protect PDF</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-20 text-center px-6">
        <div id="tool-box" class="max-w-2xl mx-auto bg-white p-12 rounded-3xl shadow-xl border-t-8 border-red-primary"
             ondragover="e => {e.preventDefault(); e.currentTarget.classList.add('drag-over')}"
             ondragleave="e => {e.preventDefault(); e.currentTarget.classList.remove('drag-over')}"
             ondrop="handleDrop(event)">
            <h2 id="tool-title" class="text-4xl font-black mb-4 uppercase">Kellyne PDF Master</h2>
            <p id="tool-desc" class="text-gray-500 mb-10">Select any tool from the menu to process.</p>
            <input type="file" id="main-input" multiple onchange="processTask(this.files)">
            <button onclick="document.getElementById('main-input').click()" class="bg-red-primary text-white px-10 py-5 rounded-2xl font-black text-xl w-full shadow-2xl transition transform hover:scale-105">
                Select Files
            </button>
            <p id="status-msg" class="mt-8 font-bold text-red-primary text-lg"></p>
        </div>
    </section>

    <script>
        const { PDFDocument, rgb, degrees } = PDFLib;
        let activeTask = 'Merge';

        function triggerTool(task) {
            activeTask = task;
            document.getElementById('tool-title').innerText = task.replace(/_/g, ' ');
            document.getElementById('main-input').click();
            window.scrollTo(0, 0);
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            processTask(e.dataTransfer.files);
        }

        async function processTask(files) {
            if (files.length === 0) return;
            const status = document.getElementById('status-msg');
            status.innerText = "Kellyne processing: " + activeTask + "...";

            try {
                let finalBytes;
                const fileName = `Kellyne_${activeTask}.pdf`;

                // --- 1. MERGE ---
                if (activeTask === 'Merge') {
                    const mergedPdf = await PDFDocument.create();
                    for (const f of files) {
                        const pdf = await PDFDocument.load(await f.arrayBuffer());
                        const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                        pages.forEach(p => mergedPdf.addPage(p));
                    }
                    finalBytes = await mergedPdf.save();
                } 
                // --- 2. ROTATE (90 Degrees) ---
                else if (activeTask === 'Rotate') {
                    const pdf = await PDFDocument.load(await files[0].arrayBuffer());
                    const pages = pdf.getPages();
                    pages.forEach(p => p.setRotation(degrees(90)));
                    finalBytes = await pdf.save();
                }
                // --- 3. WATERMARK ---
                else if (activeTask === 'Watermark') {
                    const pdf = await PDFDocument.load(await files[0].arrayBuffer());
                    const pages = pdf.getPages();
                    pages.forEach(p => {
                        const { width, height } = p.getSize();
                        p.drawText('KELLYNE PDF', { x: width/4, y: height/2, size: 50, color: rgb(0.5, 0.5, 0.5), opacity: 0.3, rotate: degrees(45) });
                    });
                    finalBytes = await pdf.save();
                }
                // --- 4. JPG TO PDF ---
                else if (activeTask === 'JPG_to_PDF') {
                    const pdfDoc = await PDFDocument.create();
                    for (const f of files) {
                        const img = await pdfDoc.embedJpg(await f.arrayBuffer());
                        const page = pdfDoc.addPage([img.width, img.height]);
                        page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                    }
                    finalBytes = await pdfDoc.save();
                }
                // --- 5. EDIT/HIGHLIGHT ---
                else if (activeTask === 'Edit') {
                    const pdf = await PDFDocument.load(await files[0].arrayBuffer());
                    const page = pdf.getPages()[0];
                    page.drawRectangle({ x: 50, y: 500, width: 200, height: 30, color: rgb(1, 1, 0), opacity: 0.5 });
                    page.drawText('Modified by Kellyne', { x: 50, y: 505, size: 15, color: rgb(0,0,0) });
                    finalBytes = await pdf.save();
                }
                // --- DEFAULT ---
                else {
                    const pdf = await PDFDocument.load(await files[0].arrayBuffer());
                    finalBytes = await pdf.save();
                }

                saveFile(finalBytes, fileName);
                status.innerText = "Task Complete!";
            } catch (e) {
                status.innerText = "Error processing. Ensure file is a valid PDF/Image.";
            }
        }

        function saveFile(bytes, name) {
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = name;
            link.click();
        }
    </script>
</body>
</html>
