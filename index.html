<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELLYNE PDF - Pro Red Bold Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-red-primary { background-color: #E53E3E; }
        
        /* Red Bold Professional Logo */
        .logo-container { display: flex; align-items: center; cursor: pointer; }
        .logo-text { font-weight: 900; font-size: 2.2rem; color: #E53E3E; letter-spacing: -1.5px; text-transform: uppercase; }

        /* Vertical Mega Menu */
        .mega-menu { 
            display: none; position: absolute; left: 50%; transform: translateX(-50%); 
            width: 96vw; background: white; z-index: 1000; box-shadow: 0 30px 60px rgba(0,0,0,0.2); 
            border-top: 6px solid #E53E3E; padding: 45px; border-radius: 0 0 30px 30px; 
            grid-template-columns: repeat(7, 1fr); gap: 20px;
        }
        .group:hover .mega-menu { display: grid; }
        .menu-col { display: flex; flex-direction: column; border-left: 1px solid #f0f0f0; padding-left: 20px; }
        .menu-col h4 { font-size: 11px; font-weight: 900; color: #E53E3E; text-transform: uppercase; margin-bottom: 18px; letter-spacing: 1.5px; }
        .menu-item { padding: 5px 0; font-size: 13px; color: #4a5568; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { color: #E53E3E; transform: translateX(5px); }

        /* Editor Workspace */
        .editor-workspace { background-color: #323639; min-height: calc(100vh - 96px); display: flex; justify-content: center; padding: 40px; overflow: auto; }
        .pdf-canvas-shadow { box-shadow: 0 0 60px rgba(0,0,0,0.6); background: white; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b sticky top-0 z-50 px-10 py-4 flex justify-between items-center h-24">
        <div class="logo-container" onclick="location.reload()">
            <span class="logo-text text-red-primary">KELLYNEPDF</span>
        </div>
        
        <div class="hidden lg:flex items-center space-x-12 font-bold text-[11px] uppercase tracking-[0.2em] text-gray-500">
            <button onclick="triggerTool('Merge')" class="hover:text-red-primary transition">Merge</button>
            <button onclick="triggerTool('Edit')" class="text-red-primary border-b-4 border-red-primary pb-1">Edit Content</button>
            <div class="group h-full flex items-center relative">
                <button class="hover:text-red-primary">All PDF Tools ▼</button>
                <div class="mega-menu">
                    <div class="menu-col">
                        <h4>Organize</h4>
                        <span onclick="triggerTool('Merge')" class="menu-item">Merge PDF</span>
                        <span onclick="triggerTool('Split')" class="menu-item">Split PDF</span>
                        <span onclick="triggerTool('Remove')" class="menu-item">Remove Pages</span>
                    </div>
