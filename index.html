<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KellynePDF - Professional PDF Solution</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Global & Professional UI Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333;
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 85px; /* Increased height for bigger logo */
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        /* Logo Section - Full Red KELLYNEPDF */
        .logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
        }

        .logo-img {
            height: 55px;
            width: auto;
            margin-right: 12px;
            display: block; 
        }

        .logo-text {
            font-size: 26px;
            font-weight: 900;
            color: #e5322d; /* Set the entire logo text to red */
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        /* Removed specific span color to keep it all red */
        .logo-text span {
            color: #e5322d; 
        }

        /* Nav Menu - Increased Font Size */
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-menu li a {
            text-decoration: none;
            color: #444;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .nav-menu li a:hover {
            color: #e5322d;
        }

        /* Right Side Actions */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .login-link {
            text-decoration: none;
            color: #333;
            font-size: 16px;
            font-weight: 700;
        }

        .signup-btn {
            background-color: #e5322d;
            color: #fff;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 800;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .signup-btn:hover {
            background-color: #c42a25;
            box-shadow: 0 5px 15px rgba(229, 50, 45, 0.3);
        }

        /* Hero Section */
        .hero {
            max-width: 1000px;
            margin: 120px auto;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 52px;
            font-weight: 800;
            color: #333;
            margin-bottom: 25px;
        }

        .hero p {
            font-size: 22px;
            color: #666;
            margin-bottom: 60px;
            line-height: 1.6;
        }

        /* Upload Button */
        .upload-area {
            display: inline-block;
            background: #e5322d;
            color: white;
            padding: 30px 90px;
            border-radius: 15px;
            font-size: 30px;
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(229, 50, 45, 0.3);
            transition: transform 0.2s, background 0.2s;
        }

        .upload-area:hover {
            background: #d42d28;
            transform: translateY(-3px);
        }

        .drop-text {
            margin-top: 25px;
            color: #999;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo-container">
                <img src="logo.png" alt="KellynePDF" class="logo-img">
                <div class="logo-text">KELLYNE<span>PDF</span></div>
            </a>
            
            <nav>
                <ul class="nav-menu">
                    <li><a href="#merge">Merge PDF</a></li>
                    <li><a href="#split">Split PDF</a></li>
                    <li><a href="#compress">Compress PDF</a></li>
                    <li><a href="#convert">Convert PDF</a></li>
                    <li><a href="#esign">eSign</a></li>
                    <li><a href="#all-tools">All PDF Tools</a></li>
                </ul>
            </nav>
        </div>

        <div class="nav-right">
            <a href="#login" class="login-link">Login</a>
            <a href="#signup" class="signup-btn">Sign up</a>
        </div>
    </header>

    <main class="hero">
        <h1>KellynePDF - All-In-One Solution</h1>
        <p>The most powerful and professional tool to manage, convert, and secure your PDF documents with ease.</p>
        
        <div class="upload-area">
            Select PDF files
        </div>
        
        <div class="drop-text">or drop PDF files here</div>
    </main>

    <script src="js/auth/google-oauth.js"></script>
    <script src="js/utils/graphics-helper.js"></script>
    <script src="js/allpdftools/organize/merge-pdf.js"></script>
    <script src="js/allpdftools/organize/split-pdf.js"></script>
    <script src="js/allpdftools/organize/extract-pages.js"></script>
    <script src="js/allpdftools/organize/remove-pages.js"></script>
    <script src="js/allpdftools/organize/rename-pdf.js"></script>
    <script src="js/allpdftools/organize/scan-to-pdf.js"></script>
    <script src="js/allpdftools/optimize/compress-pdf.js"></script>
    <script src="js/allpdftools/optimize/ocr-pdf.js"></script>
    <script src="js/allpdftools/optimize/repair-pdf.js"></script>
    <script src="js/allpdftools/edit/edit-pdf.js"></script>
    <script src="js/allpdftools/edit/crop-pdf.js"></script>
    <script src="js/allpdftools/edit/page-numbers.js"></script>
    <script src="js/allpdftools/edit/rotate-pdf.js"></script>
    <script src="js/allpdftools/edit/watermark.js"></script>
    <script src="js/allpdftools/security/protect-pdf.js"></script>
    <script src="js/allpdftools/security/unlock-pdf.js"></script>
    <script src="js/allpdftools/security/compare-pdf.js"></script>
    <script src="js/allpdftools/security/redact-pdf.js"></script>
    <script src="js/converters/from-pdf/pdf-to-word.js"></script>
    <script src="js/converters/from-pdf/pdf-to-excel.js"></script>
    <script src="js/converters/from-pdf/pdf-to-jpg.js"></script>
    <script src="js/converters/from-pdf/pdf-to-ppt.js"></script>
    <script src="js/converters/from-pdf/pdf-to-html.js"></script>
    <script src="js/converters/from-pdf/pdf-to-pdfa.js"></script>
    <script src="js/converters/to-pdf/word-to-pdf.js"></script>
    <script src="js/converters/to-pdf/jpg-to-pdf.js"></script>
    <script src="js/converters/to-pdf/excel-to-pdf.js"></script>
    <script src="js/converters/to-pdf/ppt-to-pdf.js"></script>
    <script src="js/converters/to-pdf/html-to-pdf.js"></script>
    <script src="js/converters/to-pdf/text-to-pdf.js"></script>
    <script src="js/esign/aadhar-sign.js"></script>
    <script src="js/esign/digital-sign.js"></script>
    <script src="js/esign/global-sign.js"></script>

</body>
</html>
